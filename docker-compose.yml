services:
  postgres:
    image: postgres:15-alpine
    container_name: industrial-agent-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: industrial_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d industrial_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: industrial-agent-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/industrial_agent
      ENABLE_LLM_EXTRACTION: "false"
      DB_INIT_MAX_ATTEMPTS: "30"
      DB_INIT_RETRY_DELAY_SECONDS: "2"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    container_name: industrial-agent-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
